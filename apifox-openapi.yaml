          $ref: '#/components/responses/Success'

  /api/admin/dev-log:
    get:
      tags: [Admin Content]
      summary: 后台开发日志列表
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 开发日志
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  entries:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
    post:
      tags: [Admin Content]
      summary: 新建开发日志
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
                tags:
                  type: array
                  items: { type: string }
                status: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/admin/dev-log/{id}:
    patch:
      tags: [Admin Content]
      summary: 更新开发日志
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      requestBody:
        $ref: '#/components/requestBodies/AnyJson'
      responses:
        '200':
          $ref: '#/components/responses/Success'
    delete:
      tags: [Admin Content]
      summary: 删除开发日志
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UuidId'
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/admin/team-chat/messages:
    get:
      tags: [Admin Content]
      summary: TeamChat 消息列表/增量
      security:
        - bearerAuth: []
        - adminApiToken: []
      parameters:
        - name: since
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 200 }
      responses:
        '200':
          description: 消息列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamChatMessagesResponse'

  /api/admin/team-chat/filter:
    get:
      tags: [Admin Content]
      summary: TeamChat 条件筛选
      security:
        - bearerAuth: []
        - adminApiToken: []
      parameters:
        - name: author
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, done, wont_do]
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: 消息列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamChatMessagesResponse'

  /api/admin/team-chat/send:
    post:
      tags: [Admin Content]
      summary: 发送 TeamChat 消息
      security:
        - bearerAuth: []
        - adminApiToken: []
      parameters:
        - name: X-Admin-Post-As
          in: header
          required: false
          schema:
            type: string
            enum: [fei, leon, Codex]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string }
                thread: { type: string }
      responses:
        '200':
          description: 发送结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message:
                    type: object
                    additionalProperties: true
                  claude:
                    type: object
                    nullable: true
                    additionalProperties: true

  /api/admin/team-chat/set-status:
    post:
      tags: [Admin Content]
      summary: 设置 TeamChat 消息状态
      security:
        - bearerAuth: []
        - adminApiToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_id, status]
              properties:
                message_id: { type: string, format: uuid }
                status:
                  type: string
                  enum: [open, in_progress, done, wont_do]
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/admin/team-chat/mark-read:
    post:
      tags: [Admin Content]
      summary: 标记 TeamChat 消息已读
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message_ids:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/admin/email/test:
    post:
      tags: [Admin System]
      summary: 测试邮件发送
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to]
              properties:
                to: { type: string, format: email }
                subject: { type: string }
                body: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/admin/openai/test:
    post:
      tags: [Admin System]
      summary: 测试 OpenAI 图片配置
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string }
      responses:
        '200':
          description: 测试结果
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/admin/byteplus/test:
    post:
      tags: [Admin System]
      summary: 测试 BytePlus AK/SK 与 Asset Library
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                imageUrl: { type: string, format: uri }
      responses:
        '200':
          description: 测试结果
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/admin/migrate-videos-to-stream:
    post:
      tags: [Admin System]
      summary: 批量迁移旧视频到 Cloudflare Stream
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                dryRun: { type: boolean, default: true }
                limit: { type: integer, default: 2 }
                ids:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: 迁移结果
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/admin/check-stream-status:
    post:
      tags: [Admin System]
      summary: 检查 Stream URL 实际状态
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                urls:
                  type: array
                  items: { type: string, format: uri }
                ids:
                  type: array
                  items: { type: string }
      responses:
        '200':
          description: 检查结果
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/admin/system-settings:
    get:
      tags: [Admin System]
      summary: 获取系统设置
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 设置列表,secret 值会被掩码
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  settings:
                    type: array
                    items:
                      $ref: '#/components/schemas/SystemSetting'

  /api/admin/system-settings/update:
    post:
      tags: [Admin System]
      summary: 更新系统设置
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  description: 必须在 Worker VALIDATORS allow-list 中
                value:
                  type: string
                  description: 所有设置最终按 text 存储;JSON 设置传 JSON 字符串
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  key: { type: string }
                  value: { type: string }
                  is_secret: { type: boolean }
                  updated_at: { type: string, format: date-time }

  /ffmpeg/ffmpeg-core.wasm:
    get:
      tags: [Public]
      summary: 获取 ffmpeg-core.wasm
      description: 优先从 R2 返回,缺失时从 unpkg 代理并缓存。
      security: []
      responses:
        '200':
          description: WebAssembly 文件
          content:
            application/wasm:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Supabase JWT
    adminApiToken:
      type: apiKey
      in: header
      name: X-Admin-API-Token
    stripeSignature:
      type: apiKey
      in: header
      name: Stripe-Signature

  parameters:
    ProxyPath:
      name: proxyPath
      in: path
      required: true
      schema:
        type: string
      description: 代理路径,支持多级路径。Apifox 中可填如 agent/sts/oss/token。
    UuidId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationOptional:
      name: Authorization
      in: header
      required: false
      schema:
        type: string

  requestBodies:
    AnyJson:
      required: false
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    VideoInitUpload:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title: { type: string }
              filename: { type: string }
              fileSize: { type: integer }
              contentType: { type: string }
              durationSeconds: { type: number }
              source: { type: string }
    AdminGrantTokens:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              userEmail: { type: string, format: email }
              userId: { type: string, format: uuid }
              credits:
                type: integer
                description: legacy 字段,与 tokens 二选一
              tokens:
                type: integer
                description: canonical 字段,与 credits 二选一
              tier:
                type: string
                enum: [free, starter, creator, studio]
              reason: { type: string }
              stripeInvoiceId: { type: string }
    HelpArticleWrite:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              category: { type: string }
              title: { type: string }
              body: { type: string }
              sort_order: { type: integer }
              published: { type: boolean }

  responses:
    Success:
      description: 成功
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: true }
    Error:
      description: 错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ProxyResponse:
      description: 上游透传响应
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
        text/plain:
          schema:
            type: string
        application/octet-stream:
          schema:
            type: string
            format: binary
    UploadTicket:
      description: 上传凭证
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean }
              uploadURL: { type: string, format: uri }
              uid: { type: string }
              recordId: { type: string, format: uuid }
              tusEndpoint: { type: string, format: uri }
    AdminGrantTokens:
      description: 加 Token 成功
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean }
              userId: { type: string, format: uuid }
              email: { type: string, format: email }
              newBalance: { type: integer }
              credits: { type: integer }
              tokens: { type: integer }
              tier: { type: string }

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        errMessage:
          type: string
        error:
          type: string
        reason:
          type: string

    UploadResult:
      type: object
      properties:
        success: { type: boolean }
        publicUrl: { type: string, format: uri }
        objectKey: { type: string }
        errMessage: { type: string }

    CheckoutResponse:
      type: object
      properties:
        success: { type: boolean }
        session_url: { type: string, format: uri }
        url: { type: string, format: uri }
        order_id: { type: string, format: uuid }

    GenerateStoryboardRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          description: 生成提示词
        sourceImageUrl:
          type: string
          format: uri
        style:
          type: string
        script:
          type: object
          additionalProperties: true
        protagonist:
          type: object
          additionalProperties: true
        quality:
          type: string
          enum: [low, medium, high, auto]
        size:
          type: string
          example: 1792x1024
        renderSessionId:
          type: string

    ImageGenerationResponse:
      type: object
      properties:
        success: { type: boolean }
        imageUrl:
          type: string
          format: uri
        publicUrl:
          type: string
          format: uri
        model:
          type: string
        quality:
          type: string
        size:
          type: string
        creditsCharged:
          type: integer
        tokensCharged:
          type: integer
        errMessage:
          type: string

    VideoSubmitRequest:
      type: object
      required: [prompt]
      properties:
        prompt: { type: string }
        imageUrl: { type: string, format: uri }
        imageUrls:
          type: array
          items: { type: string, format: uri }
        videoUrl: { type: string, format: uri }
        videoUrls:
          type: array
          items: { type: string, format: uri }
        duration:
          type: integer
          enum: [5, 10]
          default: 5
        ratio:
          type: string
          example: 16:9
        resolution:
          type: string
          enum: [480p, 720p, 1080p]
        generateAudio:
          type: boolean
          default: true
        model:
          type: string
          description: BytePlus endpoint id
        watermark:
          type: boolean
        renderSessionId:
          type: string

    SeriesSaveRequest:
      type: object
      required: [title]
      properties:
        seriesId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 4000
        castIds:
          type: array
          items: { type: string, format: uuid }
        episodes:
          type: array
          items:
            type: object
            additionalProperties: true
        status:
          type: string
          enum: [draft, published, archived]

    WalletBalanceResponse:
      type: object
      properties:
        success: { type: boolean }
        ucoins:
          type: integer
          description: 当前 Token 余额,历史字段名沿用 ucoins
        lifetime_purchased:
          type: integer
        lifetime_spent:
          type: integer
        recent_tx:
          type: array
          items:
            type: object
            properties:
              amount: { type: integer }
              balance_after: { type: integer }
              tx_type: { type: string }
              description: { type: string }
              created_at: { type: string, format: date-time }

    DailyClaimResponse:
      type: object
      properties:
        success: { type: boolean }
        claimed: { type: boolean }
        credits: { type: integer }
        tokens: { type: integer }
        last_claim_date: { type: string, format: date }
        added: { type: integer }
        message: { type: string }

    AdminUser:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        avatar_url: { type: string, nullable: true }
        tier: { type: string }
        credits: { type: integer }
        tokens: { type: integer }
        is_admin: { type: boolean }
        is_super_admin: { type: boolean }
        banned: { type: boolean }
        created_at: { type: string, format: date-time }

    RefundContext:
      type: object
      properties:
        orderNo: { type: string }
        orderAmount: { type: number }
        orderCreatedAt: { type: string, format: date-time }
        tier: { type: string, nullable: true }
        grantedTokens: { type: integer }
        usageTokens: { type: integer }
        usagePct: { type: number }
        generationCount: { type: integer }
        currentBalance: { type: integer }
        priorRefunds: { type: integer }
        riskLevel:
          type: string
          enum: [low, medium, high]
        riskReasons:
          type: array
          items: { type: string }
        suggestedRefundUsd: { type: number }
        suggestedRefundReason: { type: string }
        userEmail: { type: string, format: email, nullable: true }

    HelpArticle:
      type: object
      properties:
        id: { type: string, format: uuid }
        category: { type: string }
        title: { type: string }
        body: { type: string }
        sort_order: { type: integer }
        published: { type: boolean }
        updated_at: { type: string, format: date-time }

    TeamChatMessagesResponse:
      type: object
      properties:
        success: { type: boolean }
        count: { type: integer }
        messages:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              author_display_name: { type: string }
              author_kind: { type: string }
              body: { type: string }
              status: { type: string }
              thread: { type: string }
              created_at: { type: string, format: date-time }

    SystemSetting:
      type: object
      properties:
        key: { type: string }
        value:
          type: string
          nullable: true
          description: secret 会被掩码为末尾 4 位
        description: { type: string, nullable: true }
        is_secret: { type: boolean }
        configured: { type: boolean }
        updated_at: { type: string, format: date-time, nullable: true }
        updated_by: { type: string, format: uuid, nullable: true }
        updated_by_user:
          type: object
          nullable: true
          additionalProperties: true

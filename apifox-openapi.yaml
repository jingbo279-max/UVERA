openapi: 3.0.3
info:
  title: UVERA API
  version: 1.3.0
  description: |
    UVERA 项目接口文档,根据 public/_worker.js 与前端调用整理,可导入 Apifox。

    说明:
    - 主站后端运行在 Cloudflare Workers + Static Assets,生产域名为 https://uvera.ai。
    - 普通登录态接口使用 Supabase JWT: Authorization: Bearer <access_token>。
    - Admin 接口要求登录用户 user_metadata.is_admin=true;部分脚本接口也支持 X-Admin-API-Token。
    - Stripe webhook 使用 Stripe-Signature。
    - 代理/透传类接口的响应字段由上游服务决定,文档中以 additionalProperties 标注。
servers:
  - url: http://localhost:5176
    description: Vite dev server, /api 代理到线上 Worker
  - url: https://uvera.ai
    description: Production Worker

tags:
  - name: Proxy
    description: 第三方代理与对象上传代理
  - name: AI Generation
    description: OpenAI/Gemini/BytePlus 生成相关接口
  - name: Video
    description: 视频任务、Cloudflare Stream、下载与素材代理
  - name: Series Paywall
    description: 短剧保存、发布、购买、解锁与访问判断
  - name: Wallet
    description: Token/U-Coin 钱包与奖励
  - name: Stripe
    description: 订阅、Checkout、Customer Portal 与 webhook
  - name: User Uploads
    description: 用户视频上传与审核
  - name: Admin Users
    description: 后台用户与角色
  - name: Admin Orders
    description: 后台订单、退款、对账
  - name: Admin Content
    description: 内容举报、帮助文章、开发日志、TeamChat
  - name: Admin System
    description: 系统设置、模型测试、迁移工具
  - name: Public
    description: 公开读取接口与静态大文件

paths:
  /neodomain-api/{proxyPath}:
    parameters:
      - $ref: '#/components/parameters/ProxyPath'
    get:
      tags: [Proxy]
      summary: Neodomain API 透传代理
      description: 将请求透传到 https://dev.neodomain.cn,用于绕过浏览器 CORS/WAF。路径前缀会被移除。
      security: []
      responses:
        '200':
          $ref: '#/components/responses/ProxyResponse'
    post:
      tags: [Proxy]
      summary: Neodomain API 透传代理
      description: 请求体与响应体由 Neodomain 上游决定。
      security: []
      requestBody:
        $ref: '#/components/requestBodies/AnyJson'
      responses:
        '200':
          $ref: '#/components/responses/ProxyResponse'

  /neodomain-story-api/{proxyPath}:
    parameters:
      - $ref: '#/components/parameters/ProxyPath'
    get:
      tags: [Proxy]
      summary: Neodomain Story API 透传代理
      security: []
      responses:
        '200':
          $ref: '#/components/responses/ProxyResponse'
    post:
      tags: [Proxy]
      summary: Neodomain Story API 透传代理
      security: []
      requestBody:
        $ref: '#/components/requestBodies/AnyJson'
      responses:
        '200':
          $ref: '#/components/responses/ProxyResponse'

  /api/neo-oss-sts:
    get:
      tags: [Proxy]
      summary: 获取 Neodomain OSS STS Token
      description: 服务端代请求 Neodomain STS 网关。需要 Authorization 或 accesstoken header。
      security: []
      parameters:
        - $ref: '#/components/parameters/AuthorizationOptional'
        - name: accesstoken
          in: header
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Neodomain STS JSON 透传
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          description: Missing token

  /api/oss-put/{objectKey}:
    put:
      tags: [Proxy]
      summary: 代理上传到 OSS
      description: 透传 PUT 到 OSS,路径中的 objectKey 为对象 key。需要 x-oss-security-token 与 Authorization。
      security: []
      parameters:
        - name: objectKey
          in: path
          required: true
          schema:
            type: string
        - name: x-oss-security-token
          in: header
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: Content-Type
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          $ref: '#/components/responses/ProxyResponse'

  /api/upload/{objectKey}:
    put:
      tags: [Proxy]
      summary: 上传文件到 R2
      description: 通过 Worker 写入 Cloudflare R2,返回公开访问 URL。
      security: []
      parameters:
        - name: objectKey
          in: path
          required: true
          schema:
            type: string
        - name: Content-Type
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  publicUrl: { type: string, format: uri }
                  objectKey: { type: string }
    post:
      tags: [Proxy]
      summary: 上传文件到 R2
      security: []
      parameters:
        - name: objectKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'

  /api/mirror-to-r2:
    post:
      tags: [Proxy]
      summary: 下载远端图片并镜像到 R2
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sourceUrl]
              properties:
                sourceUrl:
                  type: string
                  format: uri
                  description: 原始图片地址
                accessToken:
                  type: string
                  description: 可选 Neodomain token,会作为 Authorization/accesstoken 请求源图
      responses:
        '200':
          description: 镜像成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResult'
        '500':
          $ref: '#/components/responses/Error'

  /api/proxy-asset:
    get:
      tags: [Proxy]
      summary: 素材下载代理
      description: 用于绕过素材 URL CORS,常用于 FFmpeg 合并视频。
      security: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: 原始二进制素材
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/proxy-image:
    get:
      tags: [Proxy]
      summary: 图片代理
      description: 代理图片读取,响应为图片二进制。
      security: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: 图片二进制
          content:
            image/*:
              schema:
                type: string
                format: binary

  /api/generate-storyboard:
    post:
      tags: [AI Generation]
      summary: 生成故事板/概念图
      description: 使用 OpenAI 图片模型生成故事板或概念图,成功后上传到 R2 并写 generation_logs。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateStoryboardRequest'
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationResponse'
        '401':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'

  /api/generate-image:
    post:
      tags: [AI Generation]
      summary: Free Mode 多模态出图
      description: 面向 Free Mode 的多参考图生成接口,服务端计费并记录日志。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string, description: 出图提示词 }
                referenceImageUrls:
                  type: array
                  items: { type: string, format: uri }
                quality:
                  type: string
                  enum: [low, medium, high, auto]
                  default: medium
                size:
                  type: string
                  example: 1536x1024
                renderSessionId: { type: string }
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationResponse'
        '402':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'

  /api/generate-character-board:
    post:
      tags: [AI Generation]
      summary: 生成角色设定板
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                sourceImageUrl: { type: string, format: uri }
                style: { type: string }
                protagonist:
                  type: object
                  additionalProperties: true
                renderSessionId: { type: string }
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageGenerationResponse'

  /api/describe-image:
    post:
      tags: [AI Generation]
      summary: 描述图片内容
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageUrl]
              properties:
                imageUrl: { type: string, format: uri }
                prompt: { type: string, description: 可选补充问题 }
      responses:
        '200':
          description: 图片描述
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  description: { type: string }
                  errMessage: { type: string }

  /api/extract-photo-demographics:
    post:
      tags: [AI Generation]
      summary: 提取人物照片特征
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageUrl]
              properties:
                imageUrl: { type: string, format: uri }
      responses:
        '200':
          description: 人物特征
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  demographics:
                    type: object
                    additionalProperties: true
                  errMessage: { type: string }

  /api/generate-ideas:
    post:
      tags: [AI Generation]
      summary: 随机生成创意点子
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                mode: { type: string }
                count: { type: integer, default: 3 }
                topic: { type: string }
      responses:
        '200':
          description: 创意列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  ideas:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /api/optimize-prompt:
    post:
      tags: [AI Generation]
      summary: 优化提示词
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
                mode: { type: string }
                style: { type: string }
      responses:
        '200':
          description: 优化后的提示词
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  prompt: { type: string }
                  optimizedPrompt: { type: string }

  /api/expand-character-seed:
    post:
      tags: [AI Generation]
      summary: 扩展角色种子设定
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seed]
              properties:
                seed: { type: string }
                style: { type: string }
      responses:
        '200':
          description: 扩展结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  characterSeed: { type: string }
                  result: { type: string }

  /api/generate-multi-segment-script:
    post:
      tags: [AI Generation]
      summary: 生成多段视频脚本
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transcript: { type: string }
                prompt: { type: string }
                videoType: { type: string }
                segmentCount: { type: integer }
                duration: { type: integer }
                style: { type: string }
                characterSeed: { type: string }
      responses:
        '200':
          description: 脚本生成成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  script:
                    type: object
                    additionalProperties: true
                  segments:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /api/byteplus/certify-asset:
    post:
      tags: [AI Generation]
      summary: 上传素材到 BytePlus Trusted Asset Library
      description: 将图片/视频 URL 注册为 BytePlus 私有 asset URI,用于真实人物/敏感内容回退。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, format: uri }
                type:
                  type: string
                  enum: [Image, Video]
                  default: Image
      responses:
        '200':
          description: 认证成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  assetUri: { type: string }

  /api/volcengine/video/submit:
    post:
      tags: [Video]
      summary: 提交 BytePlus/Volcengine 视频生成任务
      description: 登录必需。服务端按模型/分辨率/时长原子扣 Token,提交 Ark 任务,返回 taskId。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VideoSubmitRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  taskId: { type: string }
                  usedImage: { type: boolean }
                  chargedCredits: { type: integer }
                  chargedTokens: { type: integer }
                  renderSessionId: { type: string }
        '401':
          $ref: '#/components/responses/Error'
        '402':
          $ref: '#/components/responses/Error'

  /api/volcengine/video/status/{taskId}:
    get:
      tags: [Video]
      summary: 查询视频生成任务状态
      security: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 任务状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: succeeded/failed/running 等上游状态
                  videoUrl: { type: string, format: uri }
                  taskId: { type: string }
                  error: { type: string }
                  raw:
                    type: object
                    additionalProperties: true

  /api/video/reconcile-stuck:
    post:
      tags: [Video]
      summary: 兜底修复卡住的视频任务
      description: 前端关页后用于根据 renderSessionId/taskId 继续查询任务并退款/补写日志。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                renderSessionId: { type: string }
                taskId: { type: string }
      responses:
        '200':
          description: 修复结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  reconciled: { type: boolean }
                  status: { type: string }
                  videoUrl: { type: string, format: uri }

  /api/video-models:
    get:
      tags: [Video]
      summary: 获取可用视频模型与价格配置
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 模型列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  models:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        label: { type: string }
                        maxResolution: { type: string }
                        costMultiplier: { type: number }
                  defaultModel: { type: string }

  /api/stream/direct_upload:
    post:
      tags: [Video]
      summary: 创建 Cloudflare Stream direct_upload URL
      security: []
      responses:
        '200':
          description: Cloudflare direct_upload 返回
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/stream/upload-from-url:
    post:
      tags: [Video]
      summary: 从远端 URL 上传到 Cloudflare Stream
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [videoUrl]
              properties:
                videoUrl: { type: string, format: uri }
                title: { type: string }
                thumbnailTimestampPct: { type: number, minimum: 0, maximum: 1 }
                renderSessionId: { type: string }
      responses:
        '200':
          description: 上传结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  uid: { type: string }
                  streamUrl: { type: string, format: uri }
                  thumbnailUrl: { type: string, format: uri }

  /api/stream/enable-download:
    post:
      tags: [Video]
      summary: 为 Cloudflare Stream 视频生成 MP4 下载
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid]
              properties:
                uid: { type: string, description: Cloudflare Stream UID }
      responses:
        '200':
          description: 下载状态
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  status:
                    type: string
                    enum: [ready, inprogress, error]
                  url: { type: string, format: uri }
                  percentComplete: { type: number }

  /api/stream/download-proxy:
    get:
      tags: [Video]
      summary: Stream MP4 下载代理
      security: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
        - name: filename
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: MP4 文件
          content:
            video/mp4:
              schema:
                type: string
                format: binary

  /api/stream/set-poster-frame:
    post:
      tags: [Video]
      summary: 设置 Stream 封面帧
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uid]
              properties:
                uid: { type: string }
                pct:
                  type: number
                  minimum: 0
                  maximum: 1
                  default: 0.5
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/internal-video/init-upload:
    post:
      tags: [Video]
      summary: 内部生成视频上传初始化
      description: 为内部生成流程创建 Stream tus/direct upload 凭证。
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/VideoInitUpload'
      responses:
        '200':
          $ref: '#/components/responses/UploadTicket'

  /api/user-videos/init-upload:
    post:
      tags: [User Uploads]
      summary: 用户投稿视频初始化上传
      security:
        - bearerAuth: []
      requestBody:
        $ref: '#/components/requestBodies/VideoInitUpload'
      responses:
        '200':
          $ref: '#/components/responses/UploadTicket'

  /api/user-videos/finalize:
    post:
      tags: [User Uploads]
      summary: 用户投稿上传完成并进入审核
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recordId]
              properties:
                recordId: { type: string, format: uuid }
                fileSize: { type: integer }
                durationSeconds: { type: number }
                originalFilename: { type: string }
                streamUid: { type: string }
      responses:
        '200':
          description: finalize 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  record:
                    type: object
                    additionalProperties: true

  /api/admin/user-videos/list:
    get:
      tags: [User Uploads]
      summary: 后台获取用户视频审核列表
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [uploading, pending_review, approved, rejected]
      responses:
        '200':
          description: 审核队列
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  videos:
                    type: array
                    items:
                      type: object
                      additionalProperties: true

  /api/admin/user-videos/review:
    post:
      tags: [User Uploads]
      summary: 审核用户视频
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, action]
              properties:
                id: { type: string, format: uuid }
                action:
                  type: string
                  enum: [approve, reject]
                reason: { type: string }
                title: { type: string }
                description: { type: string }
                tags:
                  type: array
                  items: { type: string }
      responses:
        '200':
          $ref: '#/components/responses/Success'

  /api/series/save:
    post:
      tags: [Series Paywall]
      summary: 保存短剧草稿
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesSaveRequest'
      responses:
        '200':
          description: 保存成功
          content:

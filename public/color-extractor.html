<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>封面颜色提取工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #333;
    }

    .subtitle {
      color: #666;
      margin-bottom: 30px;
    }

    .upload-area {
      border: 2px dashed #ddd;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 30px;
    }

    .upload-area:hover {
      border-color: #4a90e2;
      background: #f9fbfd;
    }

    .upload-area.dragging {
      border-color: #4a90e2;
      background: #e8f4ff;
    }

    #imageInput {
      display: none;
    }

    .results {
      display: none;
      margin-top: 30px;
    }

    .results.active {
      display: block;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .preview-item {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
    }

    .preview-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .color-info {
      padding: 15px;
      background: #f9f9f9;
    }

    .color-swatch {
      width: 100%;
      height: 60px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-weight: 600;
      font-size: 14px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .info-label {
      color: #666;
      font-weight: 500;
    }

    .info-value {
      color: #333;
      font-family: monospace;
      background: #fff;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .code-output {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre;
    }

    .copy-btn {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 15px;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: #357abd;
    }

    .copy-btn:active {
      background: #2d6aa5;
    }

    .stats {
      background: #f0f7ff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      gap: 30px;
    }

    .stat-item {
      font-size: 14px;
      color: #666;
    }

    .stat-value {
      font-weight: 600;
      color: #4a90e2;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 封面颜色提取工具</h1>
    <p class="subtitle">自动从封面图提取主色调，匹配到 Tailwind CSS 100 级别颜色</p>

    <div class="upload-area" id="uploadArea">
      <p style="font-size: 18px; margin-bottom: 10px;">📁 拖拽图片到这里</p>
      <p style="color: #999;">或点击选择文件（支持多选）</p>
      <input type="file" id="imageInput" accept="image/*" multiple>
    </div>

    <div class="results" id="results">
      <div class="stats">
        <div class="stat-item">
          已处理: <span class="stat-value" id="processedCount">0</span> 张
        </div>
      </div>

      <div class="preview-grid" id="previewGrid"></div>

      <h3 style="margin-bottom: 15px;">📋 复制代码</h3>
      <div class="code-output" id="codeOutput"></div>
      <button class="copy-btn" id="copyBtn">复制到剪贴板</button>
    </div>
  </div>

  <script type="module">
    const TAILWIND_COLORS_100 = {
      'slate-100': { r: 241, g: 245, b: 249, hex: '#F1F5F9' },
      'gray-100': { r: 243, g: 244, b: 246, hex: '#F3F4F6' },
      'zinc-100': { r: 244, g: 244, b: 245, hex: '#F4F4F5' },
      'neutral-100': { r: 245, g: 245, b: 245, hex: '#F5F5F5' },
      'stone-100': { r: 245, g: 245, b: 244, hex: '#F5F5F4' },
      'red-100': { r: 254, g: 226, b: 226, hex: '#FEE2E2' },
      'orange-100': { r: 255, g: 237, b: 213, hex: '#FFEDD5' },
      'amber-100': { r: 254, g: 243, b: 199, hex: '#FEF3C7' },
      'yellow-100': { r: 254, g: 249, b: 195, hex: '#FEF9C3' },
      'lime-100': { r: 236, g: 252, b: 203, hex: '#ECFCCB' },
      'green-100': { r: 220, g: 252, b: 231, hex: '#DCFCE7' },
      'emerald-100': { r: 209, g: 250, b: 229, hex: '#D1FAE5' },
      'teal-100': { r: 204, g: 251, b: 241, hex: '#CCFBF1' },
      'cyan-100': { r: 207, g: 250, b: 254, hex: '#CFFAFE' },
      'sky-100': { r: 224, g: 242, b: 254, hex: '#E0F2FE' },
      'blue-100': { r: 219, g: 234, b: 254, hex: '#DBEAFE' },
      'indigo-100': { r: 224, g: 231, b: 255, hex: '#E0E7FF' },
      'violet-100': { r: 237, g: 233, b: 254, hex: '#EDE9FE' },
      'purple-100': { r: 243, g: 232, b: 255, hex: '#F3E8FF' },
      'fuchsia-100': { r: 250, g: 232, b: 255, hex: '#FAE8FF' },
      'pink-100': { r: 252, g: 231, b: 243, hex: '#FCE7F3' },
      'rose-100': { r: 255, g: 228, b: 230, hex: '#FFE4E6' },
    };

    const BADGE_COLORS = {
      'slate': '#94A3B8', 'gray': '#9CA3AF', 'zinc': '#A1A1AA',
      'neutral': '#A3A3A3', 'stone': '#A8A29E', 'red': '#F87171',
      'orange': '#FB923C', 'amber': '#FCD34D', 'yellow': '#FACC15',
      'lime': '#A3E635', 'green': '#4ADE80', 'emerald': '#34D399',
      'teal': '#2DD4BF', 'cyan': '#22D3EE', 'sky': '#38BDF8',
      'blue': '#60A5FA', 'indigo': '#818CF8', 'violet': '#A78BFA',
      'purple': '#A78BFA', 'fuchsia': '#E879F9', 'pink': '#F472B6',
      'rose': '#FB7185',
    };

    let processedImages = [];

    function colorDistance(c1, c2) {
      const rDiff = c1.r - c2.r;
      const gDiff = c1.g - c2.g;
      const bDiff = c1.b - c2.b;
      return Math.sqrt(rDiff * rDiff + gDiff * gDiff + bDiff * bDiff);
    }

    function findClosestColor(rgb) {
      let closest = 'gray-100';
      let minDist = Infinity;

      for (const [name, color] of Object.entries(TAILWIND_COLORS_100)) {
        const dist = colorDistance(rgb, color);
        if (dist < minDist) {
          minDist = dist;
          closest = name;
        }
      }

      return closest;
    }

    function extractColor(img) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const maxSize = 100;
      const scale = Math.min(maxSize / img.width, maxSize / img.height);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      let r = 0, g = 0, b = 0, count = 0;

      for (let i = 0; i < data.length; i += 16) {
        r += data[i];
        g += data[i + 1];
        b += data[i + 2];
        count++;
      }

      return {
        r: Math.round(r / count),
        g: Math.round(g / count),
        b: Math.round(b / count)
      };
    }

    function processImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const avgColor = extractColor(img);
            const colorName = findClosestColor(avgColor);
            const baseColor = colorName.replace('-100', '');

            const result = {
              fileName: file.name,
              imageUrl: e.target.result,
              avgColor,
              colorName,
              bgColor: `bg-${colorName}`,
              color: `from-${baseColor}-100 to-${baseColor}-300`,
              badgeHex: BADGE_COLORS[baseColor],
              tailwindHex: TAILWIND_COLORS_100[colorName].hex
            };

            resolve(result);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function renderPreview(result) {
      const item = document.createElement('div');
      item.className = 'preview-item';
      item.innerHTML = `
        <img class="preview-image" src="${result.imageUrl}" alt="${result.fileName}">
        <div class="color-info">
          <div class="color-swatch" style="background-color: ${result.tailwindHex}">
            ${result.colorName}
          </div>
          <div class="info-row">
            <span class="info-label">bgColor:</span>
            <span class="info-value">${result.bgColor}</span>
          </div>
          <div class="info-row">
            <span class="info-label">color:</span>
            <span class="info-value">${result.color}</span>
          </div>
          <div class="info-row">
            <span class="info-label">badgeHex:</span>
            <span class="info-value">${result.badgeHex}</span>
          </div>
        </div>
      `;
      return item;
    }

    function updateCodeOutput() {
      const code = processedImages.map(r =>
        `// ${r.fileName}\ncolor: '${r.color}',\nbadgeHex: '${r.badgeHex}',\nbgColor: '${r.bgColor}'`
      ).join(',\n\n');

      document.getElementById('codeOutput').textContent = code;
    }

    async function handleFiles(files) {
      const results = document.getElementById('results');
      const grid = document.getElementById('previewGrid');
      const count = document.getElementById('processedCount');

      results.classList.add('active');

      for (const file of files) {
        const result = await processImage(file);
        processedImages.push(result);

        grid.appendChild(renderPreview(result));
        count.textContent = processedImages.length;
        updateCodeOutput();
      }
    }

    // Event listeners
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');

    uploadArea.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleFiles(Array.from(e.target.files));
      }
    });

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragging');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragging');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragging');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (files.length > 0) {
        handleFiles(files);
      }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      const code = document.getElementById('codeOutput').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ 已复制!';
        setTimeout(() => {
          btn.textContent = '复制到剪贴板';
        }, 2000);
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自动更新所有媒体块颜色</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-12">
  <div class="max-w-6xl mx-auto px-4">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900 mb-4">🎨 自动更新所有媒体块颜色</h1>
      <p class="text-gray-600">使用改进的 HSL 算法为所有现有媒体项提取颜色</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
      <div class="space-y-4">
        <button
          id="startBtn"
          class="w-full py-4 bg-violet-600 text-white rounded-xl font-semibold text-lg hover:bg-violet-700 transition-colors"
        >
          开始自动提取所有颜色
        </button>

        <div id="progress" class="hidden">
          <div class="bg-gray-100 rounded-xl p-4">
            <div class="flex items-center gap-3 mb-3">
              <svg class="animate-spin w-5 h-5 text-violet-600" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span class="font-medium text-gray-900" id="progressText">准备中...</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div id="progressBar" class="bg-violet-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <p class="text-sm text-gray-500 mt-2" id="progressDetail">0 / 0</p>
          </div>
        </div>
      </div>
    </div>

    <div id="results" class="hidden space-y-8">
      <!-- 预览网格 -->
      <div>
        <h2 class="text-2xl font-bold text-gray-900 mb-4">提取结果预览</h2>
        <div id="previewGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
      </div>

      <!-- 生成的代码 -->
      <div>
        <h2 class="text-2xl font-bold text-gray-900 mb-4">生成的 mediaItems.js</h2>
        <div class="bg-gray-900 rounded-xl p-6 overflow-x-auto max-h-96 overflow-y-auto">
          <pre id="codeOutput" class="text-sm text-green-400 font-mono"></pre>
        </div>
        <div class="flex gap-3 mt-4">
          <button
            id="copyBtn"
            class="flex-1 py-3 bg-violet-600 text-white rounded-xl font-medium hover:bg-violet-700 transition-colors"
          >
            复制完整代码
          </button>
          <button
            id="downloadBtn"
            class="flex-1 py-3 bg-green-600 text-white rounded-xl font-medium hover:bg-green-700 transition-colors"
          >
            下载 mediaItems.js
          </button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    // 从当前 mediaItems.js 导入
    import { mediaItems } from '/src/data/mediaItems.js';

    const TAILWIND_COLORS_100 = {
      'slate-100': { r: 241, g: 245, b: 249 },
      'gray-100': { r: 243, g: 244, b: 246 },
      'zinc-100': { r: 244, g: 244, b: 245 },
      'neutral-100': { r: 245, g: 245, b: 245 },
      'stone-100': { r: 245, g: 245, b: 244 },
      'red-100': { r: 254, g: 226, b: 226 },
      'orange-100': { r: 255, g: 237, b: 213 },
      'amber-100': { r: 254, g: 243, b: 199 },
      'yellow-100': { r: 254, g: 249, b: 195 },
      'lime-100': { r: 236, g: 252, b: 203 },
      'green-100': { r: 220, g: 252, b: 231 },
      'emerald-100': { r: 209, g: 250, b: 229 },
      'teal-100': { r: 204, g: 251, b: 241 },
      'cyan-100': { r: 207, g: 250, b: 254 },
      'sky-100': { r: 224, g: 242, b: 254 },
      'blue-100': { r: 219, g: 234, b: 254 },
      'indigo-100': { r: 224, g: 231, b: 255 },
      'violet-100': { r: 237, g: 233, b: 254 },
      'purple-100': { r: 243, g: 232, b: 255 },
      'fuchsia-100': { r: 250, g: 232, b: 255 },
      'pink-100': { r: 252, g: 231, b: 243 },
      'rose-100': { r: 255, g: 228, b: 230 },
    };

    const BADGE_COLORS = {
      'slate': '#94A3B8', 'gray': '#9CA3AF', 'zinc': '#A1A1AA',
      'neutral': '#A3A3A3', 'stone': '#A8A29E', 'red': '#F87171',
      'orange': '#FB923C', 'amber': '#FCD34D', 'yellow': '#FACC15',
      'lime': '#A3E635', 'green': '#4ADE80', 'emerald': '#34D399',
      'teal': '#2DD4BF', 'cyan': '#22D3EE', 'sky': '#38BDF8',
      'blue': '#60A5FA', 'indigo': '#818CF8', 'violet': '#A78BFA',
      'purple': '#A78BFA', 'fuchsia': '#E879F9', 'pink': '#F472B6',
      'rose': '#FB7185',
    };

    // RGB to HSL conversion
    function rgbToHsl(r, g, b) {
      r /= 255;
      g /= 255;
      b /= 255;

      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;

      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }

      return { h: h * 360, s: s * 100, l: l * 100 };
    }

    // Find closest color using HSL matching
    function findClosestColor(rgb) {
      const inputHsl = rgbToHsl(rgb.r, rgb.g, rgb.b);
      let closestColor = 'gray-100';
      let minDistance = Infinity;

      for (const [colorName, colorRgb] of Object.entries(TAILWIND_COLORS_100)) {
        const tailwindHsl = rgbToHsl(colorRgb.r, colorRgb.g, colorRgb.b);

        // Calculate hue distance (circular)
        let hueDiff = Math.abs(inputHsl.h - tailwindHsl.h);
        if (hueDiff > 180) hueDiff = 360 - hueDiff;

        // Weight hue heavily
        const distance = hueDiff * 2 + Math.abs(inputHsl.s - tailwindHsl.s) * 0.5;

        if (distance < minDistance) {
          minDistance = distance;
          closestColor = colorName;
        }
      }

      return closestColor;
    }

    // Extract color using improved algorithm
    function extractColor(img) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const maxSize = 150;
      const scale = Math.min(maxSize / img.width, maxSize / img.height);
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      // Collect color samples with filtering
      const colorSamples = [];

      for (let i = 0; i < data.length; i += 16) {
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const a = data[i + 3];

        if (a < 10) continue;

        const brightness = (r + g + b) / 3;
        if (brightness < 30 || brightness > 240) continue;

        const hsl = rgbToHsl(r, g, b);
        if (hsl.s < 8) continue;

        colorSamples.push({ r, g, b, hsl, brightness });
      }

      // Relax filters if too few samples
      if (colorSamples.length < 100) {
        colorSamples.length = 0;
        for (let i = 0; i < data.length; i += 16) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const a = data[i + 3];

          if (a < 10) continue;

          const brightness = (r + g + b) / 3;
          if (brightness < 20 || brightness > 245) continue;

          const hsl = rgbToHsl(r, g, b);
          colorSamples.push({ r, g, b, hsl, brightness });
        }
      }

      // Sort by saturation
      colorSamples.sort((a, b) => b.hsl.s - a.hsl.s);

      // Take top 30% most saturated
      const topColors = colorSamples.slice(0, Math.ceil(colorSamples.length * 0.3));

      let r = 0, g = 0, b = 0;
      for (const sample of topColors) {
        r += sample.r;
        g += sample.g;
        b += sample.b;
      }

      return {
        r: Math.round(r / topColors.length),
        g: Math.round(g / topColors.length),
        b: Math.round(b / topColors.length)
      };
    }

    async function processImage(coverUrl) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          try {
            const avgColor = extractColor(img);
            const colorName = findClosestColor(avgColor);
            const baseColor = colorName.replace('-100', '');
            resolve({
              colorName,
              bgColor: `bg-${colorName}`,
              color: `from-${baseColor}-100 to-${baseColor}-300`,
              badgeHex: BADGE_COLORS[baseColor],
              rgb: avgColor
            });
          } catch (err) {
            reject(err);
          }
        };
        img.onerror = () => reject(new Error(`Failed to load: ${coverUrl}`));
        img.src = coverUrl;
      });
    }

    // 开始处理
    document.getElementById('startBtn').addEventListener('click', async () => {
      const startBtn = document.getElementById('startBtn');
      const progress = document.getElementById('progress');
      const results = document.getElementById('results');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      const progressDetail = document.getElementById('progressDetail');
      const previewGrid = document.getElementById('previewGrid');

      startBtn.classList.add('hidden');
      progress.classList.remove('hidden');

      const updatedItems = [];
      const total = mediaItems.length;

      for (let i = 0; i < mediaItems.length; i++) {
        const item = mediaItems[i];
        progressText.textContent = `正在处理: ${item.title}`;
        progressDetail.textContent = `${i + 1} / ${total}`;
        progressBar.style.width = `${((i + 1) / total) * 100}%`;

        try {
          const colors = await processImage(item.cover);
          const updatedItem = {
            ...item,
            color: colors.color,
            badgeHex: colors.badgeHex,
            bgColor: colors.bgColor
          };
          updatedItems.push(updatedItem);

          // 添加预览
          const preview = document.createElement('div');
          preview.className = `${colors.bgColor} p-2 rounded-xl`;
          preview.innerHTML = `
            <div class="relative rounded-lg overflow-hidden">
              <img src="${item.cover}" class="w-full aspect-square object-cover" />
              <div class="absolute bottom-0 left-0 right-0 p-2 bg-gradient-to-t from-black/70 to-transparent">
                <p class="text-white text-xs font-medium truncate">${item.title}</p>
                <p class="text-white/70 text-xs">rgb(${colors.rgb.r}, ${colors.rgb.g}, ${colors.rgb.b})</p>
                <p class="text-white/80 text-xs font-bold">${colors.colorName}</p>
              </div>
            </div>
          `;
          previewGrid.appendChild(preview);

          console.log(`✅ ${item.title}: ${colors.colorName} (${colors.rgb.r}, ${colors.rgb.g}, ${colors.rgb.b})`);
        } catch (err) {
          console.error(`❌ ${item.title}:`, err);
          updatedItems.push(item);
        }

        await new Promise(resolve => setTimeout(resolve, 100));
      }

      // 生成代码
      const code = `// Media items data with cover images
// Items are mixed by aspect ratio for better visual flow
// Colors automatically extracted using HSL-based algorithm
export const mediaItems = ${JSON.stringify(updatedItems, null, 2)};
`;

      document.getElementById('codeOutput').textContent = code;
      progress.classList.add('hidden');
      results.classList.remove('hidden');

      console.log(`🎉 完成！已处理 ${total} 个媒体项`);
    });

    // 复制代码
    document.getElementById('copyBtn').addEventListener('click', () => {
      const code = document.getElementById('codeOutput').textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copyBtn');
        const originalText = btn.textContent;
        btn.textContent = '✅ 已复制!';
        btn.classList.add('bg-green-600');
        btn.classList.remove('bg-violet-600');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.remove('bg-green-600');
          btn.classList.add('bg-violet-600');
        }, 2000);
      });
    });

    // 下载文件
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const code = document.getElementById('codeOutput').textContent;
      const blob = new Blob([code], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mediaItems.js';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
